<app-sky-background />

<app-top-nav
  [scrolled]="scrolled()"
  [mobileMenuOpen]="mobileMenuOpen()"
  [activeSection]="activeSection()"
  (menuToggled)="toggleMenu()"
  (menuClosed)="closeMenu()"
  (sectionSelected)="scrollToSection($event)"
/>

<div class="page">
  <app-hero-section />
  <app-about-section />
  <app-courses-section (openModal)="openModal($event)" />
  <app-tramites-section (openModal)="openModal($event)" />
  <app-contact-section />
</div>

<app-cpl-detail-card
  [isOpen]="activeModal() === 'm-cpl'"
  (closeRequested)="closeModal()"
/>

<app-modal-catalog
  [activeModal]="activeModal()"
  (closeRequested)="closeModal()"
/>
