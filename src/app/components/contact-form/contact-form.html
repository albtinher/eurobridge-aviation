<form class="contact-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
  <p class="contact-form-course">Consulta para: {{ courseName() }}</p>

  <label class="contact-form-label" for="fullName">Nombre completo *</label>
  <input
    id="fullName"
    class="contact-form-input"
    type="text"
    formControlName="fullName"
    autocomplete="name"
    placeholder="Tu nombre"
  />

  <label class="contact-form-label" for="email">Email *</label>
  <input
    id="email"
    class="contact-form-input"
    type="email"
    formControlName="email"
    autocomplete="email"
    placeholder="tu@email.com"
  />

  <label class="contact-form-label" for="phone">Teléfono (opcional)</label>
  <input
    id="phone"
    class="contact-form-input"
    type="tel"
    formControlName="phone"
    autocomplete="tel"
    placeholder="+34 ..."
  />

  <label class="contact-form-label" for="message">Mensaje *</label>
  <textarea
    id="message"
    class="contact-form-input contact-form-textarea"
    rows="4"
    formControlName="message"
    placeholder="Cuéntanos qué necesitas"
  ></textarea>

  @if (errorMessage()) {
    <p class="contact-form-error" role="alert">{{ errorMessage() }}</p>
  }

  <div class="contact-form-actions">
    <button class="btn-form-submit" type="submit" [disabled]="!canSubmit()">
      @if (submitting()) {
        Enviando...
      } @else {
        Enviar consulta
      }
    </button>
    <button class="btn-form-cancel" type="button" (click)="onCancel()">Cancelar</button>
  </div>
</form>
